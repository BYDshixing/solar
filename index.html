<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>硅光电池光照度计算器</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #0072BD;
            margin-top: 5px;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .formula-box {
            background-color: #f8f9fa;
            border: 1px dashed #0072BD;
            padding: 12px;
            text-align: center;
            color: #555;
            margin-bottom: 20px;
            border-radius: 6px;
            font-size: 15px;
            line-height: 1.6;
        }
        .formula-box span {
            font-weight: bold;
            color: #D95319;
            font-size: 16px;
            display: block;
            margin: 8px 0;
        }
        .input-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .input-group label {
            font-weight: bold;
            color: #555;
            width: 45%;
        }
        .input-group input {
            width: 50%;
            padding: 12px 10px;
            border: 2px solid #0072BD; 
            border-radius: 6px;
            font-size: 16px;
            background-color: #fff;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .input-group input:placeholder-shown {
            border: 1px solid #ccc;
        }
        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: center;
            font-size: 15px;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
            position: sticky;
            top: 0;
        }
        .table-container {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 6px;
        }
        @media (max-width: 500px) {
            .input-group {
                flex-direction: column;
                align-items: flex-start;
            }
            .input-group label {
                width: 100%;
                margin-bottom: 8px;
            }
            .input-group input {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💡 硅光电池光照度计算器<br><span style="font-size:14px; color:#888;"></span></h2>
    
    <div class="formula-box">
        综合校准拟合公式：
        <span>E = 0.3765 × U² / (d + 0.0612)² + 59.08</span>
        <div style="font-size:12px; color:#888; margin-top:5px;">(U电压V，d距离m)</div>
    </div>

    <div class="input-group">
        <label for="lampU">灯泡电压 U (V):</label>
        <input type="number" id="lampU" placeholder="适用范围 4~12V" step="any" inputmode="decimal" oninput="generateTable()">
    </div>

    <hr>

    <h3 style="text-align: center; color: #555; margin-bottom: 15px;">📊 实验表格数据 (步长 0.01m)</h3>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>距离 d (m)</th>
                    <th>光照度 E (Lx)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="2" style="color:#999; padding: 20px;">请在上方输入灯泡电压，表格将瞬间自动生成</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 纯净的物理核心引擎
    function calculateE(u, d) {
        if (d < 0) return 0;
        return 0.3765 * (u * u) / Math.pow((d + 0.0612), 2) + 59.08;
    }

    // 自动化表单生成逻辑
    function generateTable() {
        const uVal = parseFloat(document.getElementById('lampU').value);
        const tbody = document.getElementById('tableBody');
        
        if (isNaN(uVal)) {
            tbody.innerHTML = '<tr><td colspan="2" style="color:#999; padding: 20px;">请在上方输入灯泡电压，表格将瞬间自动生成</td></tr>';
            return;
        }

        tbody.innerHTML = ""; 

        // 自动循环输出 21 组数据
        for (let i = 5; i <= 25; i++) {
            let d = i / 100;
            const ec = calculateE(uVal, d);
            const row = document.createElement('tr');
            row.innerHTML = `<td>${d.toFixed(2)}</td><td style="font-weight:bold; color:#0072BD;">${ec.toFixed(2)}</td>`;
            tbody.appendChild(row);
        }
    }
</script>

</body>
</html>
