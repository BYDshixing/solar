<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>硅光电池光照度计算器 (综合校准版)</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #0072BD;
            margin-top: 5px;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .formula-box {
            background-color: #f8f9fa;
            border: 1px dashed #0072BD;
            padding: 12px;
            text-align: center;
            color: #555;
            margin-bottom: 20px;
            border-radius: 6px;
            font-size: 15px;
            line-height: 1.6;
        }
        .formula-box span {
            font-weight: bold;
            color: #D95319;
            font-size: 16px;
            display: block;
            margin: 8px 0;
        }
        .input-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .input-group label {
            font-weight: bold;
            color: #555;
            width: 45%;
        }
        .input-group input {
            width: 50%;
            padding: 12px 10px;
            border: 2px solid #0072BD; 
            border-radius: 6px;
            font-size: 16px;
            background-color: #fff;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .input-group input:placeholder-shown {
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #0072BD;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 5px;
        }
        button:hover {
            background-color: #00568f;
        }
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f4f8;
            border-left: 5px solid #0072BD;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            color: #333;
            display: none; 
            text-align: center;
        }
        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 25px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px 8px;
            text-align: center;
            font-size: 15px;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
        }
        @media (max-width: 500px) {
            .input-group {
                flex-direction: column;
                align-items: flex-start;
            }
            .input-group label {
                width: 100%;
                margin-bottom: 8px;
            }
            .input-group input {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💡 硅光电池光照度计算器<br><span style="font-size:14px; color:#888;">(物理补偿终极版)</span></h2>
    
    <div class="formula-box">
        已嵌入包含环境光补偿与光心偏移的拟合公式：
        <span>E = 0.3765 × U² / (d + 0.0612)² + 59.08</span>
        <div style="font-size:12px; color:#888; margin-top:5px;">(U为电压V，d为距离m)</div>
    </div>

    <div class="input-group">
        <label for="lampU">灯泡电压 U (V):</label>
        <input type="number" id="lampU" placeholder="适用范围 4~12V" step="any" inputmode="decimal" oninput="generateTable()">
    </div>

    <hr style="margin-top: 10px;">

    <h3 style="text-align: center; color: #555; margin-bottom: 15px;">📊 实验表格数据</h3>
    
    <table>
        <thead>
            <tr>
                <th>距离 d (m)</th>
                <th>光照度 E (Lx)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="2" style="color:#999;">请在上方输入灯泡电压</td></tr>
        </tbody>
    </table>

    <hr>

    <h3 style="text-align: center; color: #555;">单次距离计算</h3>
    <div class="input-group">
        <label for="distance">特定距离 d (m):</label>
        <input type="number" id="distance" placeholder="例如: 0.125" step="any" inputmode="decimal">
    </div>
    <button onclick="calculateManual()">计算该点</button>
    <div class="result-box" id="resultBox"></div>
</div>

<script>
    // 全新的一步到位物理公式引擎
    function calculateE(u, d) {
        if (d < 0) return 0; // 距离防呆设计
        // 公式：E = 0.3765 * U^2 / (d + 0.0612)^2 + 59.08
        let e = 0.3765 * (u * u) / Math.pow((d + 0.0612), 2) + 59.08;
        return e;
    }

    function generateTable() {
        const uVal = parseFloat(document.getElementById('lampU').value);
        const tbody = document.getElementById('tableBody');
        
        if (isNaN(uVal)) {
            tbody.innerHTML = '<tr><td colspan="2" style="color:#999;">等待输入电压...</td></tr>';
            return;
        }

        const distances = [0.05, 0.07, 0.09, 0.11, 0.13, 0.15, 0.17, 0.19, 0.21, 0.23, 0.25];
        tbody.innerHTML = ""; 

        distances.forEach(d => {
            const ec = calculateE(uVal, d);
            const row = document.createElement('tr');
            row.innerHTML = `<td>${d}</td><td style="font-weight:bold; color:#0072BD;">${ec.toFixed(2)}</td>`;
            tbody.appendChild(row);
        });
    }

    function calculateManual() {
        const u = parseFloat(document.getElementById('lampU').value);
        const d = parseFloat(document.getElementById('distance').value);
        const resultBox = document.getElementById('resultBox');

        if (isNaN(u) || isNaN(d)) {
            alert("请确保已输入电压和距离！");
            return;
        }

        const ec = calculateE(u, d);
        
        resultBox.style.display = "block";
        resultBox.innerHTML = `在 ${u}V 电压下，距离 ${d} m 的光照度为：<br><span style="color:#D95319; font-size: 26px; display:inline-block; margin-top:8px;">${ec.toFixed(2)} Lx</span>`;
    }
</script>

</body>
</html>
