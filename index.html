<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>硅光电池光照度计算器</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #0072BD;
            margin-top: 5px;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .formula-box {
            background-color: #f8f9fa;
            border: 1px dashed #0072BD;
            padding: 12px;
            text-align: center;
            color: #555;
            margin-bottom: 20px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
        }
        .formula-box span {
            font-weight: bold;
            color: #D95319;
        }
        .input-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .input-group label {
            font-weight: bold;
            color: #555;
            width: 45%;
        }
        .input-group input {
            width: 50%;
            padding: 12px 10px;
            border: 2px solid #0072BD; 
            border-radius: 6px;
            font-size: 16px;
            background-color: #fff;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .input-group input:placeholder-shown {
            border: 1px solid #ccc;
        }
        .k-display {
            text-align: center;
            font-size: 14px;
            color: #D95319;
            font-weight: bold;
            background-color: #fff3ed;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none; 
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #0072BD;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 5px;
        }
        button:hover {
            background-color: #00568f;
        }
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f4f8;
            border-left: 5px solid #0072BD;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            color: #333;
            display: none; 
        }
        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 25px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px 8px;
            text-align: center;
            font-size: 15px;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
        }
        @media (max-width: 500px) {
            .input-group {
                flex-direction: column;
                align-items: flex-start;
            }
            .input-group label {
                width: 100%;
                margin-bottom: 8px;
            }
            .input-group input {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💡 硅光电池光照度计算器<br><span style="font-size:14px; color:#888;">(DH-CGOP5 高精度拟合版)</span></h2>
    
    <div class="formula-box">
        已嵌入三次多项式高精度拟合模型：<br>
        
        <span>K = -0.03557 U³ + 1.0353 U² - 5.3794 U + 8.8943</span><br>
        <span>E = K / d²  (d的单位为米)</span>
    </div>

    <div class="input-group">
        <label for="lampU">灯泡电压 U (V):</label>
        <input type="number" id="lampU" placeholder="适用范围 4~12V" step="any" inputmode="decimal" oninput="generateTable()">
    </div>
    
    <div id="kDisplay" class="k-display"></div>

    <hr style="margin-top: 10px;">

    <h3 style="text-align: center; color: #555; margin-bottom: 15px;">📊 实验表格数据</h3>
    
    <table>
        <thead>
            <tr>
                <th>距离 d (m)</th>
                <th>光照度 E (Lx)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="2" style="color:#999;">请在上方输入灯泡电压</td></tr>
        </tbody>
    </table>

    <hr>

    <h3 style="text-align: center; color: #555;">单次距离计算</h3>
    <div class="input-group">
        <label for="distance">特定距离 d (m):</label>
        <input type="number" id="distance" placeholder="例如: 0.125" step="any" inputmode="decimal">
    </div>
    <button onclick="calculateManual()">计算该点</button>
    <div class="result-box" id="resultBox"></div>
</div>

<script>
    // 引擎升级：采用截图中的三次多项式公式
    function calculateDynamicK(u) {
        let k = -0.03557 * u * u * u + 1.0353 * u * u - 5.3794 * u + 8.8943;
        // 物理逻辑兜底：K不应为负
        return k > 0 ? k : 0; 
    }

    function getEc(d, k) {
        if (d <= 0) return 0;
        return k / (d * d);
    }

    function generateTable() {
        const uVal = parseFloat(document.getElementById('lampU').value);
        const tbody = document.getElementById('tableBody');
        const kDisplay = document.getElementById('kDisplay');
        
        if (isNaN(uVal)) {
            tbody.innerHTML = '<tr><td colspan="2" style="color:#999;">等待输入电压...</td></tr>';
            kDisplay.style.display = 'none';
            return;
        }

        const currentK = calculateDynamicK(uVal);
        
        kDisplay.style.display = 'block';
        if (currentK === 0) {
            kDisplay.innerHTML = `当前电压过低，发光强度 K ≈ 0`;
        } else {
            kDisplay.innerHTML = `系统已自动计算发光强度：K = ${currentK.toFixed(3)}`; // 保留3位小数体现高精度
        }

        const distances = [0.05, 0.07, 0.09, 0.11, 0.13, 0.15, 0.17, 0.19, 0.21, 0.23, 0.25];
        tbody.innerHTML = ""; 

        distances.forEach(d => {
            const ec = getEc(d, currentK);
            const row = document.createElement('tr');
            row.innerHTML = `<td>${d}</td><td style="font-weight:bold; color:#0072BD;">${ec.toFixed(2)}</td>`; // 结果保留2位小数
            tbody.appendChild(row);
        });
    }

    function calculateManual() {
        const u = parseFloat(document.getElementById('lampU').value);
        const d = parseFloat(document.getElementById('distance').value);
        const resultBox = document.getElementById('resultBox');

        if (isNaN(u) || isNaN(d)) {
            alert("请确保已输入电压和距离！");
            return;
        }

        const currentK = calculateDynamicK(u);
        const ec = getEc(d, currentK);
        
        resultBox.style.display = "block";
        resultBox.innerHTML = `在 ${u}V 电压下 (实时K=${currentK.toFixed(3)})<br>距离 ${d} m 的光照度为：<br><span style="color:#D95319; font-size: 22px;">${ec.toFixed(2)} Lx</span>`;
    }
</script>

</body>
</html>
